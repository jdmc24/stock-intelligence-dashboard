name: evals

# Runs the regulatory-enrichment eval harness against a fresh, isolated
# SQLite database. Real Anthropic calls — costs roughly $0.05–$0.15 per run.
# Path filters keep the workflow quiet for unrelated PRs (e.g. docs, CSS).

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/app/services/llm/**"
      - "backend/app/services/regulations_enrichment.py"
      - "backend/app/prompts/regulations_prompts.py"
      - "backend/app/evals/**"
      - "backend/app/models.py"
      - "backend/requirements.txt"
      - ".github/workflows/evals.yml"
  push:
    branches: [main]
    paths:
      - "backend/app/services/llm/**"
      - "backend/app/services/regulations_enrichment.py"
      - "backend/app/prompts/regulations_prompts.py"
      - "backend/app/evals/**"
      - "backend/app/models.py"
      - "backend/requirements.txt"
      - ".github/workflows/evals.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      # ANTHROPIC_API_KEY must be configured under Settings → Secrets and
      # variables → Actions → New repository secret.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Eval runner sets SEC_USER_AGENT / API_BEARER_TOKEN via os.environ
      # defaults, but pinning them here documents the dummy contract.
      SEC_USER_AGENT: "stock-intelligence-evals/0.1 (ci@example.com)"
      API_BEARER_TOKEN: "ci-not-used"
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::ANTHROPIC_API_KEY repo secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is present (length ${#ANTHROPIC_API_KEY})."

      - name: Dry-run sanity check (fixtures + imports)
        run: python -m app.evals.runner --dry

      - name: Run regulatory enrichment eval suite
        run: python -m app.evals.runner
